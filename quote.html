<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お取引 ｜ ナカツギ</title>
<style>
  :root{
    --ink:#16263F;--muted:#5C6675;--green:#137A57;--green-deep:#0C5A40;--green-soft:#E4F0EA;
    --paper:#F4F3ED;--surface:#FFFFFF;--line:rgba(22,38,63,.12);
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.65;
    display:flex;min-height:100vh;align-items:flex-start;justify-content:center;padding:36px 18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:20px;max-width:480px;width:100%;
    padding:30px;box-shadow:0 12px 40px rgba(22,38,63,.07)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;margin-bottom:22px}
  .eyebrow{font-size:12px;color:var(--muted);letter-spacing:.04em;margin-bottom:4px}
  .title{font-size:20px;font-weight:700;margin:0 0 14px}
  .desc{font-size:14px;color:var(--ink);white-space:pre-wrap;margin:0 0 22px}
  .amount{background:var(--green-soft);border-radius:14px;padding:18px 20px;text-align:center;margin-bottom:8px}
  .amount .l{font-size:12px;color:var(--green-deep);font-weight:600}
  .amount .v{font-size:32px;font-weight:700;color:var(--green-deep);line-height:1.2}
  .note{font-size:12px;color:var(--muted);margin:14px 0 22px;line-height:1.6}
  button{width:100%;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;
    background:var(--ink);color:#fff;border:none;padding:15px;border-radius:12px}
  button:hover{background:#0E1B30}
  button:disabled{opacity:.55;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);
    font-weight:600;margin-top:10px;padding:13px}
  button.ghost:hover{background:var(--paper);border-color:var(--ink)}
  .state{text-align:center;padding:14px 0}
  .state .big{font-size:19px;font-weight:700;margin:10px 0 6px}
  .state.ok .big{color:var(--green-deep)}
  .state.err .big{color:#A3352B}
  .msg{font-size:13px;color:var(--muted);text-align:center;margin-top:14px}
  .check{width:52px;height:52px;border-radius:50%;background:var(--green-soft);display:inline-flex;
    align-items:center;justify-content:center;margin-bottom:4px}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 26 26" aria-hidden="true">
        <circle cx="5" cy="13" r="3.4" fill="#16263F"/><circle cx="21" cy="13" r="3.4" fill="#16263F"/>
        <path d="M5 13 Q13 1 21 13" fill="none" stroke="#137A57" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      ナカツギ
    </div>
    <div id="content"><div class="msg">読み込み中…</div></div>
  </div>

<script>
  /* ▼ ここにデプロイした Worker の URL を入れてください（末尾スラッシュなし） */
  var WORKER_URL = "https://nakatsugi-stripe.junjiro1129.workers.dev";

  var params = new URLSearchParams(location.search);
  var id = params.get("id");
  var content = document.getElementById("content");

  function yen(n){ return "¥" + Number(n).toLocaleString("ja-JP"); }
  function ymd(s){ if(!s) return ""; var d=new Date(s);
    return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"; }

  // このリンクは注文確認から完了まで買い手が何度も開く。タブだけで進捗と「次にすること」が分かるようにする。
  var TAB_TITLES = {
    pending:        "ご注文内容のご確認",
    awaiting_funds: "ご入金のお願い",
    paid:           "完了確認のお願い",
    released:       "お取引完了",
    refunded:       "返金済み",
  };
  function setTitle(status){
    document.title = (TAB_TITLES[status] || "お取引") + " ｜ ナカツギ";
  }

  async function api(path, payload, method){
    var opts = { method: method || "POST", headers: {} };
    if(payload){ opts.headers["Content-Type"]="application/json"; opts.body=JSON.stringify(payload); }
    var res = await fetch(WORKER_URL.replace(/\/+$/,"") + path, opts);
    var data = await res.json();
    if(!res.ok) throw new Error(data.error || "エラー");
    return data;
  }

  function checkMark(){ return '<div class="check"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#0C5A40" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'; }

  // 支払い済み・受け取り確認待ち → 完了確認ボタン（＝送金トリガー）
  function showAwaiting(q){
    content.innerHTML =
      '<div class="eyebrow">お取引の状況</div>'+
      '<h1 class="title">'+escapeHtml(q.title)+'</h1>'+
      '<div class="amount"><div class="l">お預かり中の代金</div><div class="v">'+yen(q.amount)+'</div></div>'+
      '<p class="note">お支払いは完了し、代金はナカツギがお預かりしています。役務を受け取り、内容にご納得いただけたら、下のボタンで完了を確定してください。確定すると、代金が提供者へお渡しされます。</p>'+
      '<button id="done">役務を受け取りました（提供者へお支払い）</button>'+
      '<p class="msg">まだ受け取っていない・内容に問題がある場合は、確定せずに提供者または運営へご連絡ください。</p>';
    document.getElementById("done").addEventListener("click", completeQuote);
  }

  // 完了済み
  function showDone(){
    setTitle("released");
    content.innerHTML =
      '<div class="state ok">'+checkMark()+
      '<div class="big">お取引が完了しました</div>'+
      '<div class="msg">ありがとうございました。代金は提供者へお渡しされました。</div>'+
      '</div>'+
      '<button id="inv" class="ghost">適格請求書を保存・印刷（PDF可）</button>';
    document.getElementById("inv").addEventListener("click", function(){
      window.open("doc.html?id="+encodeURIComponent(id)+"&kind=invoice", "_blank");
    });
  }

  // 返金済み
  function showRefunded(){
    content.innerHTML =
      '<div class="state ok">'+
      '<div class="big">返金されました</div>'+
      '<div class="msg">お預かりしていた代金は、お客様へ返金されました。</div>'+
      '</div>';
  }
  // 銀行振込・着金待ち
  function showAwaitingFunds(q){
    content.innerHTML =
      '<div class="eyebrow">お取引の状況</div>'+
      '<h1 class="title">'+escapeHtml(q.title)+'</h1>'+
      '<div class="amount"><div class="l">お振込み金額</div><div class="v">'+yen(q.amount_inc!=null?q.amount_inc:q.amount)+'</div></div>'+
      '<p class="note">銀行振込をお選びいただきました。決済画面に表示された<b>専用の振込先</b>へ、上記の金額をお振込みください。入金が確認され次第、自動でお取引が進みます（反映まで時間がかかる場合があります）。</p>'+
      (q.instructions_url ? '<button id="reshow">振込先をもう一度表示する</button>' : '')+
      '<p class="msg">このページは入金確認後に自動で切り替わります。時間をおいて再度お開きください。ご不明な点は運営へお問い合わせください。</p>';
    var r = document.getElementById("reshow");
    if(r) r.addEventListener("click", function(){ window.open(q.instructions_url, "_blank"); });
  }
  function showError(m){
    setTitle("");
    content.innerHTML = '<div class="state err"><div class="big">表示できません</div><div class="msg">'+m+'</div></div>';
  }

  async function renderQuote(){
    try{
      var q = await api("/quotes/get?id="+encodeURIComponent(id), null, "GET");
      setTitle(q.status); // タブに進捗を反映
      if(q.status === "awaiting_funds"){ showAwaitingFunds(q); return; }
      if(q.status === "paid"){ showAwaiting(q); return; }
      if(q.status === "released"){ showDone(); return; }
      if(q.status === "refunded"){ showRefunded(); return; }
      content.innerHTML =
        '<div class="eyebrow">ご注文内容</div>'+
        '<h1 class="title">'+escapeHtml(q.title)+'</h1>'+
        (q.buyer_name ? '<p class="desc">'+escapeHtml(q.buyer_name)+' 様</p>' : '')+
        (q.seller_name ? '<p class="desc"><b>役務提供者：'+escapeHtml(q.seller_name)+'</b></p>' : '')+
        (q.description ? '<p class="desc">'+escapeHtml(q.description)+'</p>' : '')+
        '<div class="amount"><div class="v">'+yen(q.amount_inc!=null?q.amount_inc:q.amount)+'</div>'+
        (q.amount_ex!=null
          ? '<div class="l" style="margin-top:6px">税抜 '+yen(q.amount_ex)+'　＋　消費税(10%) '+yen(q.tax)+'　＝　税込 '+yen(q.amount_inc)+'</div>'
          : '<div class="l">お支払い金額（税込）</div>')+
        '</div>'+
        (q.valid_until ? '<p class="msg" style="text-align:center">有効期限：'+ymd(q.valid_until)+'</p>' : '')+
        '<p class="note">お支払いいただいた代金は、役務の提供が完了するまでナカツギがお預かりします。完了の確認後に提供者へお渡しするため、前払いのご不安なくお取引いただけます。</p>'+
        '<button id="pay">承認して支払う</button>'+
        '<button id="doc" class="ghost">請書を保存・印刷（PDF可）</button>';
      document.getElementById("doc").addEventListener("click", function(){
        window.open("doc.html?id="+encodeURIComponent(q.id)+"&kind=quote", "_blank");
      });
      document.getElementById("pay").addEventListener("click", pay);
    }catch(e){ showError(e.message); }
  }

  async function pay(){
    var btn = document.getElementById("pay");
    btn.disabled = true; btn.textContent = "決済ページへ移動中…";
    try{
      var origin = location.origin + location.pathname;
      var d = await api("/quotes/checkout", { id: id, origin: origin });
      location.href = d.url;      // Stripe Checkout へ
    }catch(e){
      btn.disabled = false; btn.textContent = "承認して支払う";
      content.insertAdjacentHTML("beforeend", '<div class="msg" style="color:#A3352B">'+e.message+'</div>');
    }
  }

  async function completeQuote(){
    if(!confirm("役務を受け取ったことを確認し、提供者へお支払いを実行します。\nこの操作は取り消せません。よろしいですか？")) return;
    var btn = document.getElementById("done");
    if(btn){ btn.disabled = true; btn.textContent = "処理中…"; }
    try{
      var d = await api("/quotes/complete", { id: id });
      if(d.status === "released") showDone();
      else renderQuote();
    }catch(e){
      if(btn){ btn.disabled = false; btn.textContent = "役務を受け取りました（提供者へお支払い）"; }
      content.insertAdjacentHTML("beforeend", '<div class="msg" style="color:#A3352B">'+e.message+'</div>');
    }
  }

  async function confirmPaid(){
    content.innerHTML = '<div class="msg">お支払いを確認しています…</div>';
    try{
      await api("/quotes/confirm", { id: id, session_id: params.get("session_id") });
      renderQuote();   // paid になれば「完了待ち」画面が出る
    }catch(e){ showError(e.message); }
  }

  function escapeHtml(s){ return String(s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

  if(!id){ showError("請書IDが指定されていません。"); }
  else if(params.get("paid")==="1" && params.get("session_id")){ confirmPaid(); }
  else if(params.get("canceled")==="1"){ renderQuote(); }
  else { renderQuote(); }
</script>
</body>
</html>
