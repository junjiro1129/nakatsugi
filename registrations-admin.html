<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナカツギ 出品者登録 管理</title>
<style>
  :root{
    --ink:#16263F;--ink-soft:#3A4A63;--muted:#5C6675;
    --green:#137A57;--green-deep:#0C5A40;--green-soft:#E4F0EA;
    --amber:#9A6B12;--amber-soft:#F7EDD6;--amber-bd:#E4C879;
    --red:#A3352B;--red-soft:#F5E1DE;--blue:#2B5A9A;--blue-soft:#E1E9F5;
    --paper:#F4F3ED;--surface:#FFFFFF;--line:rgba(22,38,63,.12);--line-soft:rgba(22,38,63,.07);
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
    --mono:"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.6;font-size:15px;padding:0 0 70px}
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px}
  .top{padding:28px 0 4px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;margin-bottom:10px}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13.5px;margin:0}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:16px}
  .card h2{font-size:13.5px;margin:0 0 13px;color:var(--green-deep)}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px;color:var(--ink-soft)}
  .fld input{width:100%;font-family:var(--sans);font-size:14px;padding:9px 11px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink)}
  .fld input:focus{outline:none;border-color:var(--green)}

  button{font-family:var(--sans);font-size:13.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);padding:9px 15px;border-radius:999px}
  button:hover{border-color:var(--ink)}
  button:disabled{opacity:.5;cursor:default}
  button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  button.primary:hover{background:#0E1B30}
  button.sm{font-size:12.5px;padding:6px 12px}
  button.go{background:var(--green);color:#fff;border-color:var(--green)}
  button.warn{background:#fff;color:var(--red);border-color:rgba(163,53,43,.4)}

  .invite-out{margin-top:12px;background:var(--green-soft);border:1px solid rgba(19,122,87,.25);border-radius:10px;padding:12px 14px;display:none}
  .invite-out .lk{font-family:var(--mono);font-size:12.5px;word-break:break-all;color:var(--green-deep);margin-bottom:8px}

  .summary{display:flex;gap:11px;flex-wrap:wrap;margin-top:16px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 16px;flex:1;min-width:100px}
  .stat.attn{background:var(--amber-soft);border-color:var(--amber-bd)}
  .stat .n{font-size:22px;font-weight:700;line-height:1}
  .stat.attn .n{color:var(--amber)}
  .stat .l{font-size:11.5px;color:var(--muted);margin-top:3px}
  .stat.attn .l{color:var(--amber);font-weight:600}

  .bar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:18px 0 8px}
  .tabs{display:flex;gap:7px;flex-wrap:wrap}
  .tab{font-size:13px;padding:7px 13px;border-radius:999px;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;color:var(--ink-soft)}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab .c{opacity:.7;margin-left:5px;font-size:11.5px}

  .reg{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px}
  .reg.attn{background:#FDF8EC;border-color:var(--amber-bd)}
  .reg-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .reg-name{font-weight:700;font-size:15.5px}
  .reg-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .badge{display:inline-block;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:999px;white-space:nowrap}
  .b-invited{background:var(--blue-soft);color:var(--blue)}
  .b-submitted{background:var(--amber-soft);color:var(--amber)}
  .b-approved{background:var(--blue-soft);color:var(--blue)}
  .b-onboarding{background:var(--amber-soft);color:var(--amber)}
  .b-active{background:var(--green-soft);color:var(--green-deep)}
  .b-rejected{background:var(--red-soft);color:var(--red)}
  .b-reviewing{background:var(--line-soft);color:var(--ink-soft)}
  .stripe-box{margin-top:14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .stripe-box .ttl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .acct{font-family:var(--mono);font-size:12.5px;color:var(--ink);word-break:break-all}
  .onbo-link{margin-top:9px;background:var(--green-soft);border:1px solid rgba(19,122,87,.25);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:11.5px;word-break:break-all;color:var(--green-deep);display:none}
  .due{font-size:12px;color:var(--amber);margin-top:6px}
  .biztype{display:flex;gap:7px;margin-bottom:9px}
  .biztype label{display:flex;align-items:center;gap:6px;font-size:12.5px;border:1.5px solid var(--line);border-radius:8px;padding:6px 11px;cursor:pointer;background:var(--surface)}
  .biztype label:has(input:checked){border-color:var(--green);background:var(--green-soft)}
  .kv{margin-top:12px;display:grid;grid-template-columns:120px 1fr;gap:5px 14px;font-size:13.5px}
  .kv dt{color:var(--muted)}
  .kv dd{margin:0;color:var(--ink)}
  .flag-ok{color:var(--green-deep);font-weight:600}
  .flag-no{color:var(--red);font-weight:600}
  .acts{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
  .verify{font-size:12px;color:var(--blue);text-decoration:underline}
  .empty{text-align:center;color:var(--muted);padding:30px;font-size:14px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;box-shadow:0 8px 30px rgba(22,38,63,.3);opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .toast.err{background:var(--red)}
  @media(max-width:640px){.row2{grid-template-columns:1fr}.kv{grid-template-columns:100px 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 26 26" aria-hidden="true">
        <circle cx="5" cy="13" r="3.4" fill="#16263F"/><circle cx="21" cy="13" r="3.4" fill="#16263F"/>
        <path d="M5 13 Q13 1 21 13" fill="none" stroke="#137A57" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      ナカツギ
    </div>
    <h1>出品者登録 管理</h1>
    <p class="sub">問い合わせを受けたら招待リンクを発行して個別に送付し、届いた申込を審査します。</p>
  </header>

  <div class="card">
    <h2>接続情報</h2>
    <div class="row2">
      <div class="fld"><label>Worker の URL</label><input id="worker" placeholder="https://nakatsugi-stripe.xxxx.workers.dev"></div>
      <div class="fld"><label>登録フォーム（register.html）の URL</label><input id="regbase" placeholder="https://＜あなたのサイト＞/register.html"></div>
    </div>
    <button class="primary" id="invite">招待リンクを発行してコピー</button>
    <div class="invite-out" id="inviteOut">
      <div class="lk" id="inviteLink"></div>
      <button class="sm" id="copyInvite">もう一度コピー</button>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="bar">
    <div class="tabs" id="tabs"></div>
    <button class="sm" id="refresh">再読み込み</button>
  </div>

  <div id="list"></div>
  <div class="empty" id="empty" hidden>まだ登録申込はありません。</div>
</div>

<div class="toast" id="toast"></div>

<script>
  var $ = function(id){ return document.getElementById(id); };
  var LSK = { w:"nakatsugi_reg_worker", b:"nakatsugi_reg_base" };
  var regs = [], filter = "all", lastLink = "";

  var STATUS = {
    invited:    { label:"招待済・未提出", cls:"b-invited" },
    submitted:  { label:"要審査",         cls:"b-submitted" },
    approved:   { label:"承認済・Stripe未作成", cls:"b-approved" },
    onboarding: { label:"本人確認・口座 待ち", cls:"b-onboarding" },
    active:     { label:"有効（取引可）", cls:"b-active" },
    rejected:   { label:"却下",           cls:"b-rejected" },
    reviewing:  { label:"審査中",         cls:"b-reviewing" },
  };
  var TABS = [
    { key:"all",        label:"すべて" },
    { key:"submitted",  label:"要審査" },
    { key:"approved",   label:"Stripe未作成" },
    { key:"onboarding", label:"本人確認待ち" },
    { key:"active",     label:"有効" },
    { key:"invited",    label:"招待済・未提出" },
    { key:"rejected",   label:"却下" },
  ];

  try{ $("worker").value=localStorage.getItem(LSK.w)||""; $("regbase").value=localStorage.getItem(LSK.b)||""; }catch(e){}
  $("worker").addEventListener("change", function(){ try{localStorage.setItem(LSK.w,$("worker").value.trim());}catch(e){} });
  $("regbase").addEventListener("change", function(){ try{localStorage.setItem(LSK.b,$("regbase").value.trim());}catch(e){} });

  function base(){ return ($("worker").value||"").trim().replace(/\/+$/,""); }
  function regBase(){ return ($("regbase").value||"").trim(); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function fmt(d){ return d ? new Date(d).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}) : ""; }

  var toastT;
  function toast(m,err){ var t=$("toast"); t.textContent=m; t.className="toast show"+(err?" err":""); clearTimeout(toastT); toastT=setTimeout(function(){t.className="toast";},2600); }

  async function api(path,payload,method){
    var url=base(); if(!url){ toast("Worker の URL を入力してください",true); return null; }
    try{
      var opts={method:method||"POST",headers:{}};
      if(payload){ opts.headers["Content-Type"]="application/json"; opts.body=JSON.stringify(payload); }
      var res=await fetch(url+path,opts); var data=await res.json();
      if(!res.ok){ toast(data.error||"エラー",true); return null; }
      return data;
    }catch(e){ toast("通信失敗："+e.message,true); return null; }
  }

  async function copy(t){ try{ await navigator.clipboard.writeText(t); }catch(_){} }

  $("invite").addEventListener("click", async function(){
    if(!regBase()){ toast("登録フォームのURLを入力してください",true); return; }
    var d = await api("/registrations/invite", {});
    if(d && d.token){
      var b=regBase();
      lastLink = b + (b.indexOf("?")>=0?"&":"?") + "token=" + encodeURIComponent(d.token);
      await copy(lastLink);
      $("inviteLink").textContent = lastLink;
      $("inviteOut").style.display="block";
      toast("招待リンクを発行してコピーしました");
      load();
    }
  });
  $("copyInvite").addEventListener("click", async function(){ if(lastLink){ await copy(lastLink); toast("コピーしました"); } });

  $("tabs").addEventListener("click", function(e){ var t=e.target.closest("[data-tab]"); if(!t)return; filter=t.getAttribute("data-tab"); render(); });
  $("refresh").addEventListener("click", load);

  async function load(){
    var d = await api("/registrations/list", null, "GET");
    if(!d) return;
    regs = d.registrations || [];
    render();
  }

  function counts(){
    var c={all:regs.length,invited:0,submitted:0,approved:0,onboarding:0,active:0,rejected:0,reviewing:0};
    regs.forEach(function(r){ if(c[r.status]!=null)c[r.status]++; });
    return c;
  }

  function render(){
    var c=counts();
    $("summary").innerHTML =
      stat(c.all,"総数",false)+stat(c.submitted,"要審査",true)+stat(c.approved,"Stripe未作成",false)+
      stat(c.onboarding,"本人確認待ち",false)+stat(c.active,"有効",false)+stat(c.invited,"未提出",false);
    $("tabs").innerHTML = TABS.map(function(t){
      var n=t.key==="all"?c.all:c[t.key];
      return '<div class="tab'+(filter===t.key?" active":"")+'" data-tab="'+t.key+'">'+t.label+'<span class="c">'+n+'</span></div>';
    }).join("");

    var list = filter==="all" ? regs : regs.filter(function(r){return r.status===filter;});
    // 未提出の招待は「すべて」以外の要審査系では隠す方が見やすいのでそのまま出す
    $("empty").hidden = list.length>0;
    var html = list.map(renderReg).join("");
    $("list").innerHTML = html;

    // wire actions
    Array.prototype.forEach.call(document.querySelectorAll("[data-approve]"), function(b){
      b.addEventListener("click", function(){ setStatus(b.getAttribute("data-approve"),"approved","この出品者を承認します。よろしいですか？"); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-reject]"), function(b){
      b.addEventListener("click", function(){ setStatus(b.getAttribute("data-reject"),"rejected","この申込を却下します。よろしいですか？"); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-copylink]"), function(b){
      b.addEventListener("click", async function(){
        var bb=regBase(); if(!bb){ toast("登録フォームのURLを入力してください",true); return; }
        var lk=bb+(bb.indexOf("?")>=0?"&":"?")+"token="+encodeURIComponent(b.getAttribute("data-copylink"));
        await copy(lk); toast("招待リンクをコピーしました");
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-copyacct]"), function(b){
      b.addEventListener("click", async function(){ await copy(b.getAttribute("data-copyacct")); toast("アカウントIDをコピーしました"); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-esttool]"), function(b){
      b.addEventListener("click", async function(){
        // この管理画面と同じ場所にある estimate.html を指す
        var base = location.origin + location.pathname.replace(/\/[^\/]*$/, "/estimate.html");
        var url = base + "?seller=" + encodeURIComponent(b.getAttribute("data-esttool"));
        await copy(url); toast("見積書ツールのURLをコピーしました（出品者へ送付）");
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-mkacct]"), function(b){
      b.addEventListener("click", function(){ makeAccount(b.getAttribute("data-mkacct"), b); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-mklink]"), function(b){
      b.addEventListener("click", function(){ makeLink(b.getAttribute("data-mklink"), b); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-chk]"), function(b){
      b.addEventListener("click", function(){ checkAccount(b.getAttribute("data-chk"), b); });
    });
  }

  async function makeAccount(token, btn){
    var sel = document.querySelector('input[name=bt_'+token+']:checked');
    var bt = sel ? sel.value : "individual";
    if(!confirm("Stripeの受取人アカウントを作成します（"+(bt==="company"?"法人":"個人事業主")+"）。\n事業者確認は完了していますか？")) return;
    btn.disabled=true; btn.textContent="作成中…";
    var d = await api("/registrations/account/create", { token: token, business_type: bt });
    if(d && d.account) toast("アカウントを作成しました："+d.account);
    load();
  }

  async function makeLink(token, btn){
    btn.disabled=true; btn.textContent="発行中…";
    var b = regBase(), urls = {};
    if(b){
      var sep = b.indexOf("?")>=0 ? "&" : "?";
      urls.return_url  = b+sep+"token="+encodeURIComponent(token)+"&done=1";   // 完了後に戻る先
      urls.refresh_url = b+sep+"token="+encodeURIComponent(token)+"&reauth=1"; // 期限切れ時
    }
    var d = await api("/registrations/account/link", Object.assign({ token: token }, urls));
    btn.disabled=false; btn.textContent="オンボーディングURLを発行してコピー";
    if(d && d.url){
      await copy(d.url);
      var box = $("lk_"+token);
      if(box){ box.textContent = d.url; box.style.display="block"; }
      toast("オンボーディングURLをコピーしました（出品者へ送付してください）");
    }
  }

  async function checkAccount(token, btn){
    btn.disabled=true; btn.textContent="確認中…";
    var d = await api("/registrations/account/status?token="+encodeURIComponent(token), null, "GET");
    btn.disabled=false; btn.textContent="STEP 3／3　有効化を確認";
    if(!d) return;
    if(d.ready){ toast("有効になりました（送金を受け取れます）"); load(); return; }
    var due = $("due_"+token);
    if(due){
      var msg = "まだ有効ではありません（送金受取 "+d.transfers+"／出金 "+(d.payouts_enabled?"可":"不可")+"）。";
      if(d.currently_due && d.currently_due.length) msg += " 未提出："+d.currently_due.join(", ");
      else if(!d.details_submitted) msg += " 出品者の入力が未完了です。";
      due.textContent = msg;
    }
    toast("まだ有効ではありません", true);
  }
  function stat(n,l,attn){ return '<div class="stat'+(attn?" attn":"")+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }

  function renderReg(r){
    var s=STATUS[r.status]||{label:r.status,cls:"b-reviewing"};
    var attn = r.status==="submitted";
    var name = r.business_name || (r.status==="invited" ? "（未提出）" : "（無名）");
    var out = '<div class="reg'+(attn?" attn":"")+'">';
    out += '<div class="reg-head"><div><div class="reg-name">'+esc(name)+'</div>'+
           '<div class="reg-sub">'+esc(r.token)+' ／ 招待 '+fmt(r.created)+(r.submitted_at?' ／ 提出 '+fmt(r.submitted_at):'')+'</div></div>'+
           '<span class="badge '+s.cls+'">'+s.label+'</span></div>';

    if(r.status==="invited"){
      out += '<div class="acts"><button class="sm" data-copylink="'+r.token+'">招待リンクをコピー</button></div>';
      return out+'</div>';
    }

    var inv = r.invoice_registered
      ? '<span class="flag-ok">登録あり</span> ／ '+esc(r.invoice_number||"(番号未入力)")
      : '<span class="flag-no">未登録</span>';
    var ev = {invoice:"① インボイス番号",kaigyo:"② 開業届（後日提出）",kakutei:"③ 確定申告（後日提出）"}[r.evidence_type] || esc(r.evidence_type||"—");
    var verify = (r.invoice_registered && r.invoice_number)
      ? ' <a class="verify" target="_blank" href="https://www.invoice-kohyo.nta.go.jp/regno-search/detail?selRegNo='+encodeURIComponent((r.invoice_number||"").replace(/^T/,""))+'">国税庁で確認</a>'
      : '';

    var isCompany = r.business_type === "company";
    out += '<dl class="kv">'+
      '<dt>区分</dt><dd>'+(isCompany?'法人':'個人事業主')+'　<span class="sub2">買い手に表示：'+esc(r.business_name||"—")+'</span></dd>'+
      '<dt>'+(isCompany?'代表者氏名':'事業主氏名（非公開）')+'</dt><dd>'+esc(r.rep_name||"—")+'</dd>'+
      '<dt>連絡先</dt><dd>'+esc(r.contact_email||"—")+(r.contact_phone?' ／ '+esc(r.contact_phone):'')+'</dd>'+
      '<dt>事業内容</dt><dd>'+esc(r.business_desc||"—")+'</dd>'+
      '<dt>インボイス</dt><dd>'+inv+verify+'</dd>'+
      '<dt>確認書類</dt><dd>'+ev+'</dd>'+
      '<dt>同意</dt><dd>規約 '+(r.agree_terms?'<span class="flag-ok">✓</span>':'<span class="flag-no">未</span>')+' ／ 適格請求書 '+(r.agree_invoice?'<span class="flag-ok">✓</span>':'<span class="flag-no">未</span>')+'</dd>'+
      (r.review_note?'<dt>審査メモ</dt><dd>'+esc(r.review_note)+'</dd>':'')+
      '</dl>';

    if(r.status==="submitted" || r.status==="reviewing"){
      out += '<div class="acts"><button class="sm go" data-approve="'+r.token+'">承認する</button>'+
             '<button class="sm warn" data-reject="'+r.token+'">却下する</button></div>';
    } else if(r.status==="approved" || r.status==="onboarding" || r.status==="active"){
      out += renderStripe(r);
    }
    return out+'</div>';
  }

  // 承認後のStripe接続（作成 → オンボーディングURL → 有効化確認）
  function renderStripe(r){
    var s = '<div class="stripe-box">';
    if(!r.account){
      s += '<div class="ttl">STEP 1／3　受取人アカウントの作成</div>'+
           '<div class="biztype">'+
             '<label><input type="radio" name="bt_'+r.token+'" value="individual" checked>個人事業主</label>'+
             '<label><input type="radio" name="bt_'+r.token+'" value="company">法人</label>'+
           '</div>'+
           '<button class="sm go" data-mkacct="'+r.token+'">Stripeアカウントを作成</button>';
      return s+'</div>';
    }
    s += '<div class="ttl">Stripe 受取人アカウント</div>'+
         '<div class="acct">'+esc(r.account)+' <button class="sm" data-copyacct="'+esc(r.account)+'" style="margin-left:6px">コピー</button></div>';

    if(r.status !== "active"){
      s += '<div style="margin-top:12px" class="ttl">STEP 2／3　本人確認・振込口座の登録リンクを送る</div>'+
           '<div class="acts" style="margin-top:0">'+
             '<button class="sm go" data-mklink="'+r.token+'">オンボーディングURLを発行してコピー</button>'+
             '<button class="sm" data-chk="'+r.token+'">STEP 3／3　有効化を確認</button>'+
           '</div>'+
           '<div class="onbo-link" id="lk_'+r.token+'"></div>'+
           '<div class="due" id="due_'+r.token+'"></div>';
    } else {
      s += '<div class="due" style="color:var(--green-deep);margin-top:9px">✓ 本人確認・口座登録が完了し、送金を受け取れる状態です。上のアカウントIDを請書作成に使えます。</div>';
    }
    // 見積書ツールURL（承認時に発行される est_ トークン。出品者に渡すと自分で見積書を作れる）
    if(r.est_token){
      s += '<div style="margin-top:12px" class="ttl">見積書ツール（出品者に渡す）</div>'+
           '<div class="acts" style="margin-top:0">'+
             '<button class="sm go" data-esttool="'+esc(r.est_token)+'">見積書ツールのURLをコピー</button>'+
           '</div>';
    }
    return s+'</div>';
  }

  async function setStatus(token, status, msg){
    var note = "";
    if(!confirm(msg)) return;
    if(status==="rejected"){ note = prompt("却下の理由（任意・記録用）","") || ""; }
    var d = await api("/registrations/status", { token: token, status: status, note: note });
    if(d){ toast(status==="approved"?"承認しました":"却下しました"); load(); }
  }

  load();
</script>
</body>
</html>
