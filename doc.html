<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書類｜ナカツギ</title>
<style>
  :root{
    --ink:#16263F;--ink-soft:#3A4A63;--muted:#5C6675;--green:#137A57;--green-deep:#0C5A40;
    --paper:#F4F3ED;--surface:#FFFFFF;--line:rgba(22,38,63,.16);--line-soft:rgba(22,38,63,.08);
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
    --mono:"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);
    line-height:1.7;font-size:14px;-webkit-font-smoothing:antialiased}

  /* 画面上のツールバー（印刷時は消える） */
  .bar{position:sticky;top:0;z-index:10;background:rgba(244,243,237,.9);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line-soft);padding:12px 20px;display:flex;gap:12px;
    align-items:center;justify-content:center;flex-wrap:wrap}
  .bar .t{font-weight:700;font-size:14px}
  button{font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;border:none;
    background:var(--ink);color:#fff;padding:10px 20px;border-radius:999px}
  button:hover{background:#0E1B30}
  .bar .hint{font-size:12px;color:var(--muted)}

  /* A4の紙 */
  .sheet{background:var(--surface);width:210mm;min-height:297mm;margin:22px auto;padding:18mm 16mm;
    box-shadow:0 2px 20px rgba(22,38,63,.10);position:relative}

  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:26px}
  h1{font-size:23px;margin:0 0 6px;letter-spacing:.14em;font-weight:700}
  .no{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .dates{font-size:11.5px;color:var(--muted);text-align:right;line-height:1.9}
  .dates b{color:var(--ink);font-weight:600}

  .to{margin-bottom:22px;padding-bottom:12px;border-bottom:2px solid var(--ink);max-width:58%}
  .to .nm{font-size:19px;font-weight:700}
  .to .sub{font-size:11.5px;color:var(--muted);margin-top:2px}

  .total{background:var(--paper);border-radius:10px;padding:15px 20px;margin-bottom:20px;
    display:flex;align-items:baseline;justify-content:space-between}
  .total .lab{font-size:13px;font-weight:700}
  .total .val{font-size:27px;font-weight:700;font-family:var(--mono);letter-spacing:-.01em}

  .parties{display:flex;gap:18px;margin-bottom:22px}
  .pt{flex:1;border:1px solid var(--line);border-radius:10px;padding:13px 15px}
  .pt .k{font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.06em;margin-bottom:4px}
  .pt .v{font-size:14.5px;font-weight:700}
  .pt .m{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.6}
  .pt .m .rn{font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:600}

  table{width:100%;border-collapse:collapse;margin-bottom:16px}
  thead th{background:var(--ink);color:#fff;font-size:11.5px;font-weight:600;padding:9px 12px;text-align:left}
  thead th.r{text-align:right}
  tbody td{padding:12px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:top}
  tbody td.r{text-align:right;font-family:var(--mono);white-space:nowrap}
  tbody .dsc{font-size:11.5px;color:var(--muted);margin-top:3px}

  .sums{margin-left:auto;width:63%;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .sums .row{display:flex;justify-content:space-between;padding:9px 15px;font-size:13px;
    border-bottom:1px solid var(--line-soft)}
  .sums .row:last-child{border-bottom:none}
  .sums .row.g{background:var(--ink);color:#fff;font-weight:700;font-size:15px}
  .sums .row.sub{background:var(--paper)}
  .sums .row .n{font-family:var(--mono)}
  .sums .row.minus .n{color:#A3352B}
  .sums .row.g.pay{background:var(--green-deep)}

  .legal{margin-top:26px;border-top:1px solid var(--line-soft);padding-top:14px;
    font-size:10.5px;color:var(--muted);line-height:1.75}
  .legal b{color:var(--ink)}

  /* 出品者向け：消費税の内訳（申告の一次資料） */
  .taxbox{margin-top:20px;border:1.5px solid var(--green);border-radius:10px;overflow:hidden}
  .notebox{margin-top:18px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .nb-h{background:var(--paper);font-size:11.5px;font-weight:700;padding:7px 15px;color:var(--ink)}
  .nb-b{padding:11px 15px;font-size:13px;color:var(--ink-soft);line-height:1.7}
  .tb-h{background:var(--green-deep);color:#fff;font-size:11.5px;font-weight:700;
    padding:8px 15px;letter-spacing:.05em}
  .tb-row{display:flex;justify-content:space-between;align-items:center;gap:14px;
    padding:11px 15px;border-bottom:1px solid var(--line-soft);font-size:13px}
  .tb-row:last-child{border-bottom:none}
  .tb-row .k{font-weight:600}
  .tb-row .k small{display:block;font-size:10.5px;color:var(--muted);font-weight:400;margin-top:1px}
  .tb-row .n{font-family:var(--mono);font-weight:700;font-size:16px;white-space:nowrap}
  .tb-row .n.up{color:var(--green-deep)}
  .tb-row .n.dn{color:#A3352B}
  .stamp{display:inline-block;font-size:11px;font-weight:700;color:var(--green-deep);
    border:1.5px solid var(--green);border-radius:6px;padding:3px 10px;margin:0 0 7px;
    letter-spacing:.06em;vertical-align:middle}
  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .state .big{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px}

  @media print{
    @page{size:A4;margin:0}
    body{background:#fff;font-size:12.5px;line-height:1.5}
    .bar{display:none}
    .sheet{width:auto;min-height:0;height:auto;margin:0;padding:9mm 13mm;box-shadow:none;page-break-inside:auto}
    h1{font-size:20px;margin:0 0 4px}
    .head{margin-bottom:11px}
    .to{margin-bottom:10px;padding-bottom:7px}
    .to .nm{font-size:17px}
    .total{margin-bottom:10px;padding:9px 18px}
    .total .val{font-size:23px}
    .parties{margin-bottom:10px}
    .pt{padding:9px 13px}
    .pt .m{line-height:1.45;margin-top:2px}
    table{margin-bottom:8px}
    thead th{padding:6px 12px}
    tbody td{padding:6px 12px}
    tbody .dsc{margin-top:1px}
    .sums .row{padding:6px 15px}
    .taxbox{margin-top:10px}
    .tb-h{padding:6px 15px}
    .tb-row{padding:6px 15px}
    .tb-row .n{font-size:14px}
    .legal{margin-top:11px;padding-top:8px;line-height:1.55}
    .total,.sums .row.sub{background:#F4F3ED !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    thead th,.sums .row.g{background:#16263F !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .sums .row.g.pay{background:#0C5A40 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .tb-h{background:#0C5A40 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
  @media(max-width:820px){ .sheet{width:auto;padding:22px 18px} .parties{flex-direction:column} .sums{width:100%} }
</style>
</head>
<body>
<div class="bar">
  <span class="t" id="barTitle">書類</span>
  <button id="print">保存・印刷</button>
  <span class="hint">印刷ダイアログで「PDFとして保存」を選ぶと、データで保存できます。</span>
</div>
<div id="app"></div>

<script>
  // ▼デプロイ済みWorkerのURL
  var WORKER_URL = "https://nakatsugi-stripe.junjiro1129.workers.dev";

  var p = new URLSearchParams(location.search);
  var id = p.get("id"), kind = p.get("kind") || "quote";
  var app = document.getElementById("app");

  var TITLES = { estimate:"御 見 積 書", quote:"請 書", invoice:"請 求 書", statement:"精 算 書" };
  var BARTTL = { estimate:"見積書", quote:"請書", invoice:"適格請求書", statement:"精算書（お支払い明細）" };

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function yen(n){ return "¥" + Number(n||0).toLocaleString("ja-JP"); }
  function ymd(s){ if(!s) return "—"; var d=new Date(s);
    return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"; }

  document.getElementById("print").addEventListener("click", function(){ window.print(); });

  function err(m){ app.innerHTML = '<div class="sheet"><div class="state"><div class="big">表示できません</div><div>'+esc(m)+'</div></div></div>'; }

  function render(d){
    document.getElementById("barTitle").textContent = BARTTL[d.kind] || "書類";
    document.title = (BARTTL[d.kind]||"書類") + "｜ナカツギ";

    var isInv = d.kind === "invoice";
    var isStm = d.kind === "statement";
    var isEst = d.kind === "estimate";
    // 精算書は出品者宛（当社→出品者の利用料請求）。それ以外は買い手宛。
    var toName = isStm ? d.seller_name : (d.buyer_name || d.buyer_email || "お取引先");

    var html = '<div class="sheet">';

    // 見出し
    html += '<div class="head"><div><h1>'+TITLES[d.kind]+'</h1>'+
      (isInv ? '<div><span class="stamp">適格請求書</span></div>' : '')+
      '<div class="no">No. '+esc(d.id)+'</div></div>'+
      '<div class="dates">';
    if (d.kind === "quote" || isEst) {
      html += '発行日：<b>'+ymd(d.created)+'</b><br>有効期限：<b>'+ymd(d.valid_until)+'</b>';
    } else if (isInv) {
      var invDate = d.completed_at || d.paid_at || d.created;
      html += '発行日：<b>'+ymd(invDate)+'</b><br>'+
              '取引年月日：<b>'+ymd(invDate)+'</b>';
    } else {
      var stmDate = d.completed_at || d.paid_at || d.created;
      html += '発行日：<b>'+ymd(stmDate)+'</b><br>送金日：<b>'+ymd(stmDate)+'</b>';
    }
    html += '</div></div>';

    // 宛名
    html += '<div class="to"><div class="nm">'+esc(toName)+'　御中</div>'+
      '<div class="sub">'+(isStm ? '出品者さま' : 'お取引先さま')+'</div></div>';

    // 合計
    var totalLabel = isStm ? "お振込金額" : (isInv ? "ご請求金額（税込）" : (isEst ? "お見積金額（税込）" : "ご注文金額（税込）"));
    var totalVal   = isStm ? d.payout : d.amount_inc;
    html += '<div class="total"><div class="lab">'+totalLabel+'</div><div class="val">'+yen(totalVal)+'</div></div>';

    // 当事者
    var issuerContact = isStm
      ? esc(d.issuer.addr)+'　TEL '+esc(d.issuer.tel)+'　'+esc(d.issuer.mail)  // 精算書は1行に圧縮
      : esc(d.issuer.addr)+'<br>TEL '+esc(d.issuer.tel)+'　'+esc(d.issuer.mail);
    html += '<div class="parties">'+
      '<div class="pt"><div class="k">発行者</div><div class="v">'+esc(d.issuer.name)+'</div>'+
        '<div class="m">登録番号：<span class="rn">'+esc(d.issuer.invoice_no)+'</span><br>'+
        issuerContact+'</div></div>';
    if (!isStm) {
      html += '<div class="pt"><div class="k">役務提供者</div><div class="v">'+esc(d.seller_name)+'</div>'+
        '<div class="m">'+(isEst
          ? '本見積の役務提供者です。ご発注の際は、当サービスを通じてお手続きいただきます。'
          : '本取引の役務提供者です。ご請求・決済は発行者が行います。')+'</div></div>';
    }
    html += '</div>';

    // 明細
    html += '<table><thead><tr><th>内容</th><th class="r">税率</th><th class="r">金額（税抜）</th></tr></thead><tbody>';
    if (isStm) {
      html += '<tr><td>'+esc(d.title)+'<div class="dsc">お取引の対価（お預かり金額 '+yen(d.amount_inc)+'）</div></td>'+
        '<td class="r">'+d.tax_rate+'%</td><td class="r">'+yen(d.amount_ex)+'</td></tr>'+
        '<tr><td>ナカツギ利用料（'+d.fee_rate+'%）<div class="dsc">お取引金額（税込）に対する利用料です</div></td>'+
        '<td class="r">'+d.tax_rate+'%</td><td class="r">-'+yen(d.fee_ex).slice(1)+'</td></tr>';
    } else {
      html += '<tr><td>'+esc(d.title)+(d.description?'<div class="dsc">'+esc(d.description)+'</div>':'')+'</td>'+
        '<td class="r">'+d.tax_rate+'%</td><td class="r">'+yen(d.amount_ex)+'</td></tr>';
    }
    html += '</tbody></table>';

    // 集計
    html += '<div class="sums">';
    if (isStm) {
      html += '<div class="row sub"><span>お取引金額（税込）</span><span class="n">'+yen(d.amount_inc)+'</span></div>'+
        '<div class="row"><span>利用料（税抜）</span><span class="n">'+yen(d.fee_ex)+'</span></div>'+
        '<div class="row"><span>利用料の消費税（'+d.tax_rate+'%）</span><span class="n">'+yen(d.fee_tax)+'</span></div>'+
        '<div class="row minus"><span>利用料 合計（税込）</span><span class="n">-'+yen(d.fee_inc).slice(1)+'</span></div>'+
        '<div class="row g pay"><span>お振込金額</span><span class="n">'+yen(d.payout)+'</span></div>';
    } else {
      html += '<div class="row"><span>'+d.tax_rate+'%対象　小計（税抜）</span><span class="n">'+yen(d.amount_ex)+'</span></div>'+
        '<div class="row"><span>消費税（'+d.tax_rate+'%）</span><span class="n">'+yen(d.tax)+'</span></div>'+
        '<div class="row g"><span>合計（税込）</span><span class="n">'+yen(d.amount_inc)+'</span></div>';
    }
    html += '</div>';

    // 見積書の備考（納期・条件など）
    if (isEst && d.note) {
      html += '<div class="notebox"><div class="nb-h">備考</div><div class="nb-b">'+esc(d.note).replace(/\n/g,'<br>')+'</div></div>';
    }

    // 出品者向け：消費税の内訳（申告の一次資料）。預かった税＝納める側、払った税＝控除できる側。
    if (isStm) {
      html += '<div class="taxbox">'+
        '<div class="tb-h">消費税の内訳（確定申告のご参考に）</div>'+
        '<div class="tb-row"><div class="k">お預かりした消費税'+
          '<small>お取引金額に含まれる消費税。お客様が申告・納付します。</small></div>'+
          '<div class="n up">'+yen(d.tax)+'</div></div>'+
        '<div class="tb-row"><div class="k">お支払いになった消費税'+
          '<small>ナカツギ利用料に含まれる消費税。仕入税額控除の対象です。</small></div>'+
          '<div class="n dn">'+yen(d.fee_tax)+'</div></div>'+
        '<div class="tb-row"><div class="k">差引'+
          '<small>本取引に係る消費税の差引額（目安）</small></div>'+
          '<div class="n">'+yen(d.tax - d.fee_tax)+'</div></div>'+
        '</div>';
    }

    // 注記
    html += '<div class="legal">';
    if (isEst) {
      html += '<b>本書は御見積書です。</b>本見積の有効期限は '+ymd(d.valid_until)+' です。金額・内容は変更となる場合があります。<br>'+
        'ご発注の際は、役務提供者より「請書」をお送りします。請書をご承認いただいた時点で契約が成立し、以降のご請求・お支払い・代金のお預かりは、ナカツギ（'+esc(d.issuer.name)+'）を通じて行われます。';
    } else if (isStm) {
      html += '<b>本書は、ナカツギ利用料に係る適格請求書です。</b>上記の利用料について、発行者の登録番号にて交付します。<br>'+
        '<b>また本書は、当社が購入者へ交付した適格請求書の写しの交付に代えて交付するものです。</b>'+
        '（消費税法施行令第70条の12第1項に定める媒介者交付特例）。法令に定める期間、保存してください。<br>'+
        'お取引金額・利用料それぞれの消費税額は、上記「消費税の内訳」欄をご確認ください。';
    } else {
      html += '<b>本書は、'+esc(d.issuer.name)+'が、上記の役務提供者から委託を受け、媒介者交付特例（消費税法施行令第70条の12第1項）に基づき交付するものです。</b>'+
        '役務提供契約の当事者は役務提供者であり、当社は当該契約の当事者ではありません。<br>';
      if (isInv) html += '本書は適格請求書です。仕入税額控除の適用にあたっては、法令に定める期間、保存してください。<br>';
      if (d.kind === "quote") html += '本書は請書です。ご承認いただいた時点で、記載の内容により役務提供契約が成立します。有効期限は '+ymd(d.valid_until)+' です。お支払い後、役務の完了が確認されるまで、代金は決済事業者にて留保されます。<br>';
      html += 'お支払いいただいた代金は、役務の完了が確認された後に役務提供者へ引き渡されます。';
    }
    html += '</div></div>';
    app.innerHTML = html;
  }

  (async function(){
    if(!id){ err("書類のリンクが正しくありません。"); return; }
    try{
      var res = await fetch(WORKER_URL.replace(/\/+$/,"")+"/quotes/doc?id="+encodeURIComponent(id)+"&kind="+encodeURIComponent(kind));
      var d = await res.json();
      if(!res.ok) throw new Error(d.error || "取得できませんでした");
      render(d);
    }catch(e){ err(e.message); }
  })();
</script>
</body>
</html>
